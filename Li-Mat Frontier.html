<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Li-Mat Frontier - 汽车材料行业前沿资讯</title>
    <!-- 引入 Tailwind CSS 样式框架 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 自定义样式：科技简约风 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
        }

        /* 卡片悬停效果 - Notion/Linear 风格 */
        .article-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #e5e7eb;
        }
        .article-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.08);
            border-color: #3b82f6;
        }

        /* 分类标签悬停效果 */
        .category-tag {
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .category-tag:hover {
            transform: scale(1.05);
        }

        /* 加载动画 */
        .loader {
            border: 3px solid #f3f4f6;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 文字截断效果 */
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-gray-50">

    <!-- ==================== 页面头部 ==================== -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-5">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-2xl font-bold text-gray-900">Li-Mat Frontier</h1>
                    <p class="text-sm text-gray-500 mt-1">汽车材料行业前沿资讯 | 每日 8:50 自动更新</p>
                </div>
                <div class="text-right">
                    <p class="text-xs text-gray-400">上次更新</p>
                    <p class="text-sm font-medium text-gray-700" id="lastUpdate">加载中...</p>
                </div>
            </div>
        </div>
    </header>

    <!-- ==================== 分类导航栏 ==================== -->
    <nav class="bg-white border-b sticky top-[88px] z-40 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex overflow-x-auto py-4 space-x-3 scrollbar-hide" id="categoryNav">
                <!-- JavaScript 动态生成分类按钮 -->
            </div>
        </div>
    </nav>

    <!-- ==================== 主内容区 ==================== -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- 加载状态 -->
        <div id="loadingState" class="flex flex-col items-center justify-center py-20">
            <div class="loader"></div>
            <p class="mt-6 text-gray-600 font-medium">正在加载资讯...</p>
        </div>

        <!-- 文章列表容器 -->
        <div id="articleList" class="space-y-4 hidden">
            <!-- JavaScript 动态生成文章卡片 -->
        </div>

        <!-- 空状态提示 -->
        <div id="emptyState" class="text-center py-20 hidden">
            <svg class="mx-auto h-16 w-16 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
            </svg>
            <p class="mt-4 text-lg text-gray-500">暂无相关资讯</p>
            <p class="mt-2 text-sm text-gray-400">数据更新中，请稍后再试</p>
        </div>
    </main>

    <!-- ==================== 页面底部 ==================== -->
    <footer class="bg-white border-t mt-16 py-6">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <p class="text-sm text-gray-500">Li-Mat Frontier | 新势力车企材料技术前沿资讯聚合</p>
            <p class="text-xs text-gray-400 mt-1">数据来源于各网站官方 RSS 源 | 仅供个人学习研究使用</p>
        </div>
    </footer>

    <!-- ==================== 核心功能 JavaScript 代码 ==================== -->
    <script>
        // ========== 全局变量 ==========
        let allArticles = []; // 存储所有文章数据
        let currentCategory = '全部'; // 当前选中的分类
        let categories = []; // 所有分类

        // ========== 页面初始化函数 ==========
        async function init() {
            console.log('🚀 Li-Mat Frontier 初始化中...');

            // 加载数据
            await loadData();

            console.log('✅ 初始化完成');
        }

        // ========== 加载 JSON 数据 ==========
        async function loadData() {
            try {
                // 添加时间戳避免缓存
                const timestamp = new Date().getTime();
                const response = await fetch(`data/news.json?t=${timestamp}`);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();

                // 更新数据
                allArticles = data.articles || [];
                categories = data.categories || [];

                // 更新界面
                document.getElementById('lastUpdate').textContent = data.updateTime || '未知';

                // 生成分类导航
                generateCategoryNav();

                // 渲染文章
                renderArticles();

                // 隐藏加载状态
                hideLoading();

                console.log(`✅ 加载成功: ${allArticles.length} 篇文章`);

            } catch (error) {
                console.error('❌ 加载失败:', error);
                showError('加载数据失败',
                    '无法加载资讯数据，可能是：\n' +
                    '1. 数据文件尚未生成（GitHub Actions 首次运行需要时间）\n' +
                    '2. 网络连接问题\n\n' +
                    '请稍后刷新页面重试。');
            }
        }

        // ========== 生成分类导航栏 ==========
        function generateCategoryNav() {
            const nav = document.getElementById('categoryNav');
            nav.innerHTML = '';

            const allCategories = ['全部', ...categories];

            allCategories.forEach(category => {
                const button = document.createElement('button');
                button.className = `category-tag px-5 py-2 rounded-lg text-sm font-medium whitespace-nowrap ${
                    category === currentCategory
                        ? 'bg-blue-600 text-white shadow-md'
                        : 'bg-gray-100 text-gray-700 hover:bg-gray-200'
                }`;
                button.textContent = category;
                button.onclick = () => switchCategory(category);
                nav.appendChild(button);
            });
        }

        // ========== 切换分类 ==========
        function switchCategory(category) {
            console.log(`📂 切换到分类: ${category}`);
            currentCategory = category;

            // 更新导航按钮的样式
            const buttons = document.querySelectorAll('#categoryNav button');
            buttons.forEach(btn => {
                if (btn.textContent === category) {
                    btn.className = 'category-tag px-5 py-2 rounded-lg text-sm font-medium whitespace-nowrap bg-blue-600 text-white shadow-md';
                } else {
                    btn.className = 'category-tag px-5 py-2 rounded-lg text-sm font-medium whitespace-nowrap bg-gray-100 text-gray-700 hover:bg-gray-200';
                }
            });

            // 重新渲染文章列表
            renderArticles();
        }

        // ========== 渲染文章列表 ==========
        function renderArticles() {
            const container = document.getElementById('articleList');
            const emptyState = document.getElementById('emptyState');
            container.innerHTML = '';

            // 根据当前选中的分类筛选文章
            let filtered = allArticles;
            if (currentCategory !== '全部') {
                filtered = allArticles.filter(a => a.category === currentCategory);
            }

            // 如果没有文章，显示空状态
            if (filtered.length === 0) {
                container.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }

            // 显示文章列表
            emptyState.classList.add('hidden');
            container.classList.remove('hidden');

            // 为每篇文章创建卡片
            filtered.forEach(article => {
                const card = createArticleCard(article);
                container.appendChild(card);
            });

            console.log(`📄 已渲染 ${filtered.length} 篇文章`);
        }

        // ========== 创建单个文章卡片 ==========
        function createArticleCard(article) {
            const card = document.createElement('div');
            card.className = 'article-card bg-white rounded-xl p-6';

            // 格式化日期
            const date = new Date(article.date);
            const dateStr = date.toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });

            card.innerHTML = `
                <div class="flex items-start justify-between mb-3">
                    <div class="flex items-center space-x-3">
                        <span class="text-xs text-gray-500">${dateStr}</span>
                        <span class="px-3 py-1 bg-blue-50 text-blue-700 text-xs font-medium rounded-full">
                            ${escapeHtml(article.category)}
                        </span>
                    </div>
                </div>

                <h3 class="text-lg font-semibold text-gray-900 mb-3 hover:text-blue-600 cursor-pointer transition-colors"
                    onclick="window.open('${escapeHtml(article.link)}', '_blank')">
                    ${escapeHtml(article.title)}
                </h3>

                <p class="text-sm text-gray-600 mb-4 line-clamp-2 leading-relaxed">
                    ${escapeHtml(article.summary || article.description)}
                </p>

                <button onclick="window.open('${escapeHtml(article.link)}', '_blank')"
                        class="inline-flex items-center text-sm text-blue-600 hover:text-blue-700 font-medium transition-colors">
                    查看原文
                    <svg class="ml-1 w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                    </svg>
                </button>
            `;

            return card;
        }

        // ========== HTML 转义（防止 XSS 攻击）==========
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }

        // ========== 隐藏加载状态 ==========
        function hideLoading() {
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('articleList').classList.remove('hidden');
        }

        // ========== 显示错误信息 ==========
        function showError(title, message) {
            const loadingState = document.getElementById('loadingState');
            loadingState.innerHTML = `
                <div class="text-center">
                    <svg class="mx-auto h-16 w-16 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                    </svg>
                    <h3 class="mt-4 text-lg font-semibold text-red-600">${title}</h3>
                    <p class="mt-2 text-sm text-gray-600 whitespace-pre-line max-w-md mx-auto">${message}</p>
                    <button onclick="location.reload()" class="mt-4 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                        刷新页面
                    </button>
                </div>
            `;
            console.error(title, message);
        }

        // ========== 页面加载完成后自动执行初始化 ==========
        window.addEventListener('DOMContentLoaded', init);
    </script>

</body>
</html>
